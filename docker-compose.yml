services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PHX_HOST=localhost
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-your-secret-key-base-here}
      - PORT=4000
      - DATABASE_URL=postgres://jersey:jersey@db/jersey_prod
      - POOL_SIZE=10
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/bin/server", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - jersey-network

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=jersey
      - POSTGRES_PASSWORD=jersey
      - POSTGRES_DB=jersey_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jersey -d jersey_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jersey-network

volumes:
  postgres_data:

networks:
  jersey-network:
    driver: bridge
